# GFS Data Download Configuration
# See https://noaa-gfs-bdp-pds.s3.amazonaws.com for available data

# Forecast initialization date (YYYY-MM-DD).
# Used when `date_range` below is not set.
date: "2026-01-01"

# Optional date range for batch / historical downloads.
# When present, this OVERRIDES `date` and downloads every cycle init in [start, end].
# Files are organised under <output_dir>/<YYYYMMDD>/<CC>z/ to avoid collisions.
# date_range:
#   start: "2026-01-01"
#   end:   "2026-02-01"
#   step_days: 1

# Forecast cycle hour. Either a single value or a list — applies to every date.
#   Single cycle: cycle: 12
#   Multiple cycles: cycles: [0, 6, 12, 18]
# When `cycles` is set it OVERRIDES `cycle`.
# cycle: 12
cycles: [0, 12]

# Forecast hour range to download (relative to each cycle init time).
# Either a {start, end, step} block, or the special string "all" to
# auto-discover every available forecast hour on S3 for each (date, cycle).
# forecast_hours:
#   start: 0
#   end: 24
#   step: 6
forecast_hours: all   # download every available f-hour (0–384h, ~209 files per init)

# Variables to download (must match NCEP short names and level strings exactly).
# Curated set for renewable-energy / power-trading forecasting.
variables:
  # ── Wind power: hub-height + reference ──────────────────────────
  - {name: "UGRD", level: "100 m above ground"}     # 100m 风分量 U
  - {name: "VGRD", level: "100 m above ground"}     # 100m 风分量 V
  - {name: "UGRD", level: "80 m above ground"}      # 80m 风分量 U（部分机组轮毂高度）
  - {name: "VGRD", level: "80 m above ground"}
  - {name: "UGRD", level: "10 m above ground"}      # 10m 标准近地风
  - {name: "VGRD", level: "10 m above ground"}

  # ── 850 hPa 同步流场 / 边界层信息 ──────────────────────────────
  - {name: "UGRD", level: "850 mb"}
  - {name: "VGRD", level: "850 mb"}
  - {name: "TMP",  level: "850 mb"}
  - {name: "RH",   level: "850 mb"}
  - {name: "HGT",  level: "850 mb"}                 # 850hPa 位势高度

  # ── 温度（多高度，用于温度梯度 / 空气密度） ─────────────────────
  - {name: "TMP",  level: "2 m above ground"}
  - {name: "TMP",  level: "80 m above ground"}
  - {name: "TMP",  level: "100 m above ground"}
  - {name: "TMP",  level: "surface"}

  # ── 湿度 ──────────────────────────────────────────────────────
  - {name: "RH",   level: "2 m above ground"}       # 相对湿度
  - {name: "SPFH", level: "2 m above ground"}       # 比湿（精确算空气密度用）
  - {name: "SPFH", level: "80 m above ground"}
  - {name: "DPT",  level: "2 m above ground"}       # 露点

  # ── 气压（与 T、SPFH 配合算空气密度 ρ = p / (Rd · Tv)） ──────────
  - {name: "PRES",  level: "surface"}
  - {name: "PRES",  level: "80 m above ground"}
  - {name: "PRMSL", level: "mean sea level"}

  # ── 太阳辐射通量（光伏出力关键输入） ───────────────────────────
  - {name: "DSWRF", level: "surface"}               # 下行短波辐射
  - {name: "USWRF", level: "surface"}               # 上行短波辐射
  - {name: "DLWRF", level: "surface"}               # 下行长波辐射
  - {name: "ULWRF", level: "surface"}               # 上行长波辐射

  # ── 云量（影响光伏出力波动） ───────────────────────────────────
  - {name: "TCDC", level: "entire atmosphere"}
  - {name: "TCDC", level: "convective cloud layer"}
  - {name: "TCDC", level: "boundary layer cloud layer"}
  - {name: "LCDC", level: "low cloud layer"}
  - {name: "MCDC", level: "middle cloud layer"}
  - {name: "HCDC", level: "high cloud layer"}

  # ── 降水 / 水文（水电、来水预测） ───────────────────────────────
  - {name: "APCP",  level: "surface"}                                  # 累计降水
  - {name: "PRATE", level: "surface"}                                  # 瞬时降水率
  - {name: "PWAT",  level: "entire atmosphere (considered as a single layer)"}  # 大气可降水量

# Geographic region to subset (degrees). Comment out to download full global data.
region:
  lat_min: 15.0
  lat_max: 55.0
  lon_min: 105.0
  lon_max: 150.0

# Output directory for downloaded files
output_dir: "./output"

# Plotting settings (off by default — pass --plot on the CLI to enable, or set enabled: true here)
plot:
  enabled: false
  type: "wind_speed"       # "wind_speed" computes sqrt(u^2 + v^2)
  output_format: "png"     # "png" or "pdf"
  dpi: 300
  colormap: "viridis"
